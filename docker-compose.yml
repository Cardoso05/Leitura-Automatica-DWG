 version: "3.9"

 services:
   db:
     image: postgres:15-alpine
     restart: unless-stopped
     environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: postgres
       POSTGRES_DB: takeoff
     ports:
       - "5432:5432"
     volumes:
       - db-data:/var/lib/postgresql/data

   redis:
     image: redis:7-alpine
     restart: unless-stopped
     ports:
       - "6379:6379"

   backend:
     build: ./backend
     restart: unless-stopped
     env_file:
       - backend/.env
     environment:
       DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/takeoff
       REDIS_URL: redis://redis:6379/0
     depends_on:
       - db
       - redis
     ports:
       - "8000:8000"
     volumes:
       - ./backend/storage:/app/storage

   frontend:
     build: ./frontend
     restart: unless-stopped
     environment:
       NEXT_PUBLIC_API_URL: http://localhost:8000/api
     depends_on:
       - backend
     ports:
       - "3000:3000"

 volumes:
   db-data:
